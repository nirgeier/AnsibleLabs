name: Docker Image CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: nirgeier/ansiblelabs
  SERVER_IMAGE_NAME: nirgeier/ansiblelabs-server
  REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: nirgeier/ansiblelabs
  DOCKERHUB_SERVER_IMAGE: nirgeier/ansiblelabs-server

jobs:
  build-and-push:
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Cache for act local builds
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          path: |
            ~/.cache/docker
            ~/.docker/buildx
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Add docker multi-platform build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build mkdocs site
        run: bash .mkdocs-shared/init_site.sh --no-serve

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        name: Set up Docker metadata
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=auto
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            IMAGE_TAG=${{ github.sha }}
            BUILD_TIME=${{ github.run_id }}
            SourceRepository=${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./docker/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          provenance: false
          push: true
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}

      # ── Server image (Dockerfile.server) ────────────────────────────────────
      - id: meta-server
        name: Set up Docker metadata (server)
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=auto
          images: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
            ${{ env.DOCKERHUB_SERVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ./docker
          file: ./docker/Dockerfile.server
          labels: ${{ steps.meta-server.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          provenance: false
          push: true
          sbom: false
          tags: ${{ steps.meta-server.outputs.tags }}
